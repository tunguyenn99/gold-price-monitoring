<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Monitor | Vietnam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #FFD700;
            --primary-dark: #B8860B;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #FFD700, #FDB931);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .price-card h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .price-val {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .unit {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .chart-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn.active {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gold Price Monitor</h1>
            <p>Real-time gold benchmarks in Vietnam (Source: 24h.com.vn)</p>
        </header>

        <div id="latest-prices" class="stats-grid">
            <!-- Latest prices will be injected here -->
            <div class="loading">Loading latest data...</div>
        </div>

        <div class="btn-group" id="brand-selector">
            <!-- Brand selector buttons -->
        </div>

        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <footer>
            <p>&copy; 2026 Tu Nguyen | Built with Python & GitHub Actions</p>
        </footer>
    </div>

    <script>
        let goldData = [];
        let currentBrand = 'SJC';
        let chart = null;

        async function fetchData() {
            try {
                const response = await fetch('data/gold_prices.json');
                goldData = await response.json();
                initDashboard();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('latest-prices').innerHTML = '<div class="card" style="grid-column: 1/-1; text-align: center; color: var(--danger)">Failed to load data. Please ensure the pipeline has run.</div>';
            }
        }

        function initDashboard() {
            if (goldData.length === 0) return;

            const latest = goldData[goldData.length - 1];
            renderLatestPrices(latest);
            renderBrandSelector();
            updateChart();
        }

        function renderLatestPrices(snapshot) {
            const container = document.getElementById('latest-prices');
            container.innerHTML = '';

            // Show top 3 brands or similar
            const importantBrands = ['SJC', 'DOJI HN', 'PNJ Hà Nội'];
            
            importantBrands.forEach(brandName => {
                const entry = snapshot.entries.find(e => e.brand === brandName) || snapshot.entries[0];
                const card = document.createElement('div');
                card.className = 'card price-card';
                card.innerHTML = `
                    <h3>${entry.brand}</h3>
                    <div class="price-val">
                        <span style="color: var(--primary)">${formatPrice(entry.sell)}</span>
                        <span class="unit">k VND</span>
                    </div>
                    <div style="font-size: 0.85rem; color: var(--text-secondary)">
                        Buy: ${formatPrice(entry.buy)}k | Sell: ${formatPrice(entry.sell)}k
                    </div>
                    <div style="font-size: 0.75rem; margin-top: 1rem; color: var(--accent)">
                        Updated: ${snapshot.timestamp}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderBrandSelector() {
            const container = document.getElementById('brand-selector');
            const brands = [...new Set(goldData[0].entries.map(e => e.brand))];
            
            container.innerHTML = '';
            brands.slice(0, 6).forEach(brand => {
                const btn = document.createElement('button');
                btn.className = `btn ${brand === currentBrand ? 'active' : ''}`;
                btn.textContent = brand;
                btn.onclick = () => {
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentBrand = brand;
                    updateChart();
                };
                container.appendChild(btn);
            });
        }

        function updateChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            const labels = goldData.map(d => d.date);
            const buyPrices = goldData.map(d => {
                const entry = d.entries.find(e => e.brand === currentBrand);
                return entry ? entry.buy : null;
            });
            const sellPrices = goldData.map(d => {
                const entry = d.entries.find(e => e.brand === currentBrand);
                return entry ? entry.sell : null;
            });

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Buy Price (Selling to Shop)',
                            data: buyPrices,
                            borderColor: '#38bdf8',
                            backgroundColor: 'rgba(56, 189, 248, 0.1)',
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: 'Sell Price (Buying from Shop)',
                            data: sellPrices,
                            borderColor: '#FFD700',
                            backgroundColor: 'rgba(255, 215, 0, 0.1)',
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: { color: '#94a3b8', font: { family: 'Inter' } }
                        },
                        title: {
                            display: true,
                            text: `Historical Price Trend: ${currentBrand}`,
                            color: '#f8fafc',
                            font: { size: 18, family: 'Inter', weight: '600' }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(255, 255, 255, 0.05)' }
                        },
                        x: {
                            ticks: { color: '#94a3b8' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function formatPrice(val) {
            return new Intl.NumberFormat('en-US').format(val);
        }

        fetchData();
    </script>
</body>
</html>
